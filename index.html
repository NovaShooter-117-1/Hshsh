<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c10;
    --snake-head: #00ffaa;
    --apple: #ff3355;
    --text: #aaccbb;
    --dead: #ff3355;
  }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    user-select: none;
    overflow: hidden;
  }

  /* ── INTRO SCREEN ─────────────────────────────────────── */
  #intro {
    position: fixed;
    inset: 0;
    background: #080c10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 0;
    overflow: hidden;
  }

  #intro-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  #intro-wallpaper {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    opacity: 0.5;
    filter: saturate(1.4) brightness(0.55);
    z-index: 0;
    transform-origin: center center;
    animation: wallpaperFloat 14s ease-in-out infinite alternate;
  }

  @keyframes wallpaperFloat {
    0%   { transform: scale(1.08) translate(0px, 0px); filter: saturate(1.4) brightness(0.55); }
    25%  { transform: scale(1.13) translate(-12px, -8px); }
    50%  { transform: scale(1.1)  translate(8px, -14px); filter: saturate(1.6) brightness(0.6); }
    75%  { transform: scale(1.14) translate(10px, 6px); }
    100% { transform: scale(1.09) translate(-6px, 10px); filter: saturate(1.4) brightness(0.55); }
  }


  .intro-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2em;
  }

  .intro-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: #00ffaa88;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.6s 0.2s forwards;
  }

  .intro-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(4rem, 16vw, 8rem);
    letter-spacing: 0.15em;
    line-height: 1;
    color: #00ffaa;
    text-shadow:
      0 0 30px #00ffaacc,
      0 0 80px #00ffaa66,
      0 0 160px #00ffaa22;
    opacity: 0;
    animation: titlePop 0.8s 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .intro-title .apple-letter {
    color: #ff3355;
    text-shadow:
      0 0 30px #ff3355cc,
      0 0 80px #ff335566;
    display: inline-block;
    animation: appleBob 2s 1.5s ease-in-out infinite;
  }

  .intro-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    letter-spacing: 0.3em;
    color: #aaccbb99;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s 1s forwards;
  }

  .intro-btn {
    margin-top: 1.5em;
    background: none;
    border: 1px solid #00ffaa;
    color: #00ffaa;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.75rem, 2.5vw, 1rem);
    letter-spacing: 0.3em;
    padding: 0.75em 2.5em;
    cursor: pointer;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s 1.4s forwards, btnPulse 2s 2s ease-in-out infinite;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .intro-btn:hover {
    background: #00ffaa22;
    box-shadow: 0 0 30px #00ffaa66;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 3;
  }

  .intro-hint {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: #aaccbb44;
    opacity: 0;
    animation: fadeUp 0.6s 1.8s forwards;
  }

  .intro-class {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.6rem, 1.8vw, 0.8rem);
    letter-spacing: 0.35em;
    color: #00ffaa;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s 2.1s forwards;
    text-shadow: 0 0 12px #00ffaa66;
    border: 1px solid #00ffaa33;
    padding: 0.35em 1.2em;
    border-radius: 2px;
  }

  .dev-credits {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45em;
    opacity: 0;
    animation: fadeUp 0.6s 2.4s forwards;
    margin-top: 0.3em;
  }

  .designer-credits {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3em;
    margin-top: 0.5em;
    opacity: 0;
    animation: fadeUp 0.6s 2.7s forwards;
  }

  .designer-name {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.72rem, 2vw, 0.95rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #ff3355dd;
    padding: 0.55em 1.2em;
    border: 1px solid #ff335555;
    border-radius: 4px;
    background: #ff33550d;
    box-shadow: 0 0 10px #ff335522, inset 0 0 8px #ff33550a;
    text-shadow: 0 0 12px #ff335588;
  }

  .dev-label {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: #00ffaa88;
    text-transform: uppercase;
    margin-bottom: 0.3em;
    font-family: 'Orbitron', sans-serif;
  }

  .dev-list {
    display: flex;
    gap: 0.8em;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dev-link {
    position: relative;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.72rem, 2vw, 0.95rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #00ffaadd;
    text-decoration: none;
    padding: 0.55em 1.2em;
    border: 1px solid #00ffaa55;
    border-radius: 4px;
    background: #00ffaa0d;
    box-shadow: 0 0 10px #00ffaa22, inset 0 0 8px #00ffaa0a;
    transition: color 0.2s, border-color 0.2s, text-shadow 0.2s, transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }

  .dev-link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, #00ffaa11, transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  .dev-link:hover {
    color: #00ffaa;
    border-color: #00ffaa55;
    text-shadow: 0 0 10px #00ffaa88;
    transform: translateY(-2px);
  }
  .dev-link:hover::before { transform: translateX(100%); }

  .dev-link:active { transform: scale(0.96) translateY(0); }

  .dev-fb-icon {
    font-size: 0.65em;
    opacity: 0.5;
    margin-left: 0.3em;
    vertical-align: middle;
    transition: opacity 0.2s;
  }
  .dev-link:hover .dev-fb-icon { opacity: 1; }

  @keyframes devShimmer {
    0%   { text-shadow: 0 0 6px #00ffaa44; }
    50%  { text-shadow: 0 0 14px #00ffaaaa, 0 0 30px #00ffaa44; }
    100% { text-shadow: 0 0 6px #00ffaa44; }
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(14px); }
  }
  @keyframes titlePop {
    from { opacity: 0; transform: scale(0.82) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes appleBob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 0 0px #00ffaa00; }
    50%      { box-shadow: 0 0 22px #00ffaa55; }
  }

  /* intro → game transition */
  #intro.hide {
    animation: introOut 0.7s cubic-bezier(0.4,0,1,1) forwards;
  }
  @keyframes introOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(1.04); }
  }

  /* ── GAME UI ─────────────────────────────────────── */
  #game-ui {
    display: none;
    flex-direction: column;
    align-items: center;
  }
  #game-ui.show { display: flex; }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.25em;
    color: var(--snake-head);
    text-shadow: 0 0 20px #00ffaa88, 0 0 60px #00ffaa33;
    margin-bottom: 0.3em;
  }

  #hud {
    display: flex;
    gap: 3em;
    margin-bottom: 1em;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .stat span {
    color: #00ffaa;
    font-size: 1.4em;
    font-family: 'Orbitron', sans-serif;
  }

  #canvas-wrap { position: relative; }

  canvas#c {
    display: block;
    border: 1px solid #00ffaa33;
    box-shadow: 0 0 40px #00ffaa18, inset 0 0 60px #00000088;
    image-rendering: pixelated;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #080c10cc;
    backdrop-filter: blur(2px);
    gap: 1em;
  }
  #overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    letter-spacing: 0.2em;
    color: var(--dead);
    text-shadow: 0 0 20px var(--dead);
  }
  #overlay h2.start { color: var(--snake-head); text-shadow: 0 0 20px var(--snake-head); }
  #overlay p { font-size: 0.85rem; letter-spacing: 0.1em; color: var(--text); opacity: 0.7; }

  button.game-btn {
    margin-top: 0.5em;
    background: none;
    border: 1px solid var(--snake-head);
    color: var(--snake-head);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    padding: 0.6em 2em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, box-shadow 0.15s;
  }
  button.game-btn:hover { background: #00ffaa22; box-shadow: 0 0 20px #00ffaa55; }

  #dpad {
    display: none;
    margin-top: 1.2em;
    gap: 0;
    grid-template-areas: ". up ." "left . right" ". down .";
    grid-template-columns: repeat(3, 3.5rem);
    grid-template-rows: repeat(3, 3.5rem);
  }
  @media (pointer: coarse) { #dpad { display: grid; } }
  .dpad-btn {
    display: flex; align-items: center; justify-content: center;
    background: #0d1520; border: 1px solid #00ffaa44;
    color: #00ffaa; font-size: 1.2rem;
    cursor: pointer; touch-action: manipulation; transition: background 0.1s;
  }
  .dpad-btn:active { background: #00ffaa22; }
  .dpad-btn[data-dir="UP"]    { grid-area: up; }
  .dpad-btn[data-dir="LEFT"]  { grid-area: left; }
  .dpad-btn[data-dir="RIGHT"] { grid-area: right; }
  .dpad-btn[data-dir="DOWN"]  { grid-area: down; }

  #menu-btn {
    position: absolute;
    top: 6px;
    left: 6px;
    z-index: 10;
    background: #080c10cc;
    border: 1px solid #ff335566;
    color: #ff3355aa;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    padding: 0.4em 0.9em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, box-shadow 0.15s, color 0.15s, border-color 0.15s;
  }
  #menu-btn:hover, #menu-btn:active {
    background: #ff335522;
    box-shadow: 0 0 12px #ff335544;
    color: #ff3355;
    border-color: #ff3355aa;
  }
</style>

<script>
// ── INTRO PARTICLE SNAKE ───────────────────────────────────────────────────
(function() {
  const ic = document.getElementById('intro-canvas');
  const ix = ic.getContext('2d');

  function resize() { ic.width = window.innerWidth; ic.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  // A demo snake that loops around the screen
  const SPEED = 2.2;
  const SEG_LEN = 14;
  const NUM_SEGS = 38;

  let pts = [];
  let cx = window.innerWidth * 0.5;
  let cy = window.innerHeight * 0.7;
  let angle = 0;
  let t = 0;

  // seed pts
  for (let i = 0; i < NUM_SEGS; i++) {
    pts.push({ x: cx - i * SEG_LEN, y: cy });
  }

  // apples
  let apples = [];
  function spawnApple() {
    apples.push({
      x: 80 + Math.random() * (window.innerWidth - 160),
      y: 80 + Math.random() * (window.innerHeight - 160),
      r: 6 + Math.random() * 4,
      eaten: false,
      alpha: 1
    });
  }
  for (let i = 0; i < 5; i++) spawnApple();

  let raf;
  function tick() {
    t++;
    ix.clearRect(0, 0, ic.width, ic.height);

    // draw faint grid
    ix.strokeStyle = '#0d152044';
    ix.lineWidth = 0.4;
    const G = 28;
    for (let x = 0; x < ic.width; x += G) {
      ix.beginPath(); ix.moveTo(x,0); ix.lineTo(x,ic.height); ix.stroke();
    }
    for (let y = 0; y < ic.height; y += G) {
      ix.beginPath(); ix.moveTo(0,y); ix.lineTo(ic.width,y); ix.stroke();
    }

    // steer toward nearest apple
    const head = pts[0];
    let nearest = null, nd = Infinity;
    apples.forEach(a => {
      if (a.eaten) return;
      const d = Math.hypot(a.x - head.x, a.y - head.y);
      if (d < nd) { nd = d; nearest = a; }
    });

    if (nearest) {
      const desired = Math.atan2(nearest.y - head.y, nearest.x - head.x);
      let diff = desired - angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      angle += Math.sign(diff) * Math.min(Math.abs(diff), 0.055);

      if (nd < 14) {
        nearest.eaten = true;
        setTimeout(spawnApple, 600);
      }
    } else {
      angle += Math.sin(t * 0.018) * 0.04;
    }

    // wrap
    const nx = head.x + Math.cos(angle) * SPEED;
    const ny = head.y + Math.sin(angle) * SPEED;
    pts.unshift({ x: nx, y: ny });
    pts.pop();

    // draw apples
    apples = apples.filter(a => a.alpha > 0);
    apples.forEach(a => {
      if (a.eaten) { a.alpha -= 0.06; }
      ix.globalAlpha = a.alpha;
      // glow
      const g = ix.createRadialGradient(a.x, a.y, 0, a.x, a.y, a.r * 3);
      g.addColorStop(0, '#ff335566'); g.addColorStop(1, 'transparent');
      ix.fillStyle = g;
      ix.beginPath(); ix.arc(a.x, a.y, a.r * 3, 0, Math.PI*2); ix.fill();
      // body
      ix.shadowColor = '#ff3355'; ix.shadowBlur = 10;
      ix.fillStyle = '#ff3355';
      ix.beginPath(); ix.arc(a.x, a.y, a.r, 0, Math.PI*2); ix.fill();
      ix.shadowBlur = 0;
      // shine
      ix.fillStyle = 'rgba(255,255,255,0.4)';
      ix.beginPath(); ix.arc(a.x - a.r*0.3, a.y - a.r*0.3, a.r*0.3, 0, Math.PI*2); ix.fill();
      ix.globalAlpha = 1;
    });

    // draw snake
    pts.forEach((p, i) => {
      const frac = i / NUM_SEGS;
      const isHead = i === 0;
      const size = isHead ? 11 : 8 - frac * 3;
      const alpha = 1 - frac * 0.5;

      ix.globalAlpha = alpha;
      if (isHead) {
        ix.shadowColor = '#00ffaa'; ix.shadowBlur = 22;
        ix.fillStyle = '#00ffaa';
      } else {
        ix.shadowBlur = 0;
        const b = Math.round(200 - frac * 140);
        ix.fillStyle = `rgb(0,${b},${Math.round(b*0.5)})`;
      }
      ix.beginPath();
      ix.roundRect(p.x - size/2, p.y - size/2, size, size, isHead ? 4 : 2);
      ix.fill();

      if (isHead) {
        ix.shadowBlur = 0;
        // eyes
        const ex = Math.cos(angle), ey = Math.sin(angle);
        const ox = -ey * 3, oy = ex * 3;
        ix.fillStyle = '#001a10';
        ix.globalAlpha = 1;
        ix.beginPath(); ix.arc(p.x + ex*5 + ox, p.y + ey*5 + oy, 2, 0, Math.PI*2); ix.fill();
        ix.beginPath(); ix.arc(p.x + ex*5 - ox, p.y + ey*5 - oy, 2, 0, Math.PI*2); ix.fill();
      }
    });
    ix.globalAlpha = 1;
    ix.shadowBlur = 0;

    raf = requestAnimationFrame(tick);
  }
  tick();

  // stop when leaving intro
  window._stopIntroAnim = () => cancelAnimationFrame(raf);
})();

// ── INTRO → GAME TRANSITION ────────────────────────────────────────────────
document.getElementById('introBtn').addEventListener('click', () => {
  const intro = document.getElementById('intro');
  intro.classList.add('hide');
  window._stopIntroAnim();
  setTimeout(() => {
    intro.style.display = 'none';
    document.getElementById('game-ui').classList.add('show');
  }, 650);
});

// ── SOUND ENGINE (Web Audio API) ─────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playEatSound() {
  try {
    const ac = getAudioCtx();
    // Juicy "pop" + rising chime
    const osc1 = ac.createOscillator();
    const osc2 = ac.createOscillator();
    const gain1 = ac.createGain();
    const gain2 = ac.createGain();

    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(300, ac.currentTime);
    osc1.frequency.exponentialRampToValueAtTime(680, ac.currentTime + 0.12);
    gain1.gain.setValueAtTime(0.35, ac.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);

    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(880, ac.currentTime + 0.05);
    osc2.frequency.exponentialRampToValueAtTime(1320, ac.currentTime + 0.2);
    gain2.gain.setValueAtTime(0.0, ac.currentTime);
    gain2.gain.setValueAtTime(0.22, ac.currentTime + 0.05);
    gain2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);

    osc1.connect(gain1); gain1.connect(ac.destination);
    osc2.connect(gain2); gain2.connect(ac.destination);
    osc1.start(ac.currentTime); osc1.stop(ac.currentTime + 0.2);
    osc2.start(ac.currentTime + 0.05); osc2.stop(ac.currentTime + 0.28);
  } catch(e) {}
}

function playWrapSound() {
  try {
    const ac = getAudioCtx();
    // Quick "whoosh" blip
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.1);
    gain.gain.setValueAtTime(0.18, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.13);
  } catch(e) {}
}

function playDeathSound() {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(440, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(55, ac.currentTime + 0.5);
    gain.gain.setValueAtTime(0.4, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.55);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.6);
  } catch(e) {}
}

// ── GAME LOGIC ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');

const CELL = 20, COLS = 25, ROWS = 25;
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

let snake, dir, nextDir, apple, score, best = 0, running = false, raf2, lastTime, speed;

function init() {
  snake   = [{x:12,y:12},{x:11,y:12},{x:10,y:12}];
  dir     = {x:1,y:0};
  nextDir = {x:1,y:0};
  score   = 0; speed = 130;
  scoreEl.textContent = 0;
  placeApple();
}

function placeApple() {
  let pos;
  do { pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  apple = pos;
}

function step() {
  dir = {...nextDir};
  let nx = snake[0].x + dir.x;
  let ny = snake[0].y + dir.y;

  // Wall wrap-around with sound
  let wrapped = false;
  if (nx < 0)    { nx = COLS - 1; wrapped = true; }
  if (nx >= COLS){ nx = 0;        wrapped = true; }
  if (ny < 0)    { ny = ROWS - 1; wrapped = true; }
  if (ny >= ROWS){ ny = 0;        wrapped = true; }
  if (wrapped) playWrapSound();

  const head = {x: nx, y: ny};
  if (snake.some(s=>s.x===head.x&&s.y===head.y)) return die();
  snake.unshift(head);
  if (head.x===apple.x && head.y===apple.y) {
    score++; scoreEl.textContent = score;
    if (score>best){best=score; bestEl.textContent=best;}
    speed = Math.max(55, 130 - score*4);
    playEatSound();
    placeApple();
  } else { snake.pop(); }
}

function die() {
  running = false;
  cancelAnimationFrame(raf2);
  playDeathSound();
  drawDead();
  overlay.style.display = 'flex';
  overlay.innerHTML = `<h2>GAME OVER</h2><p>SCORE: ${score}</p><button class="game-btn" id="startBtn">PLAY AGAIN</button>`;
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function drawGrid() {
  ctx.fillStyle='#080c10'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#0d1520'; ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}
}

function drawApple() {
  const cx=apple.x*CELL+CELL/2, cy=apple.y*CELL+CELL/2, r=CELL/2-2;
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2);
  grd.addColorStop(0,'#ff335588'); grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,r*2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff3355'; ctx.shadowColor='#ff3355'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(cx-r*0.25,cy-r*0.25,r*0.3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#88cc55'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.quadraticCurveTo(cx+4,cy-r-5,cx+2,cy-r-8); ctx.stroke();
}

function drawSnake() {
  snake.forEach((seg,i)=>{
    const t=i/snake.length, isHead=i===0;
    const x=seg.x*CELL+1, y=seg.y*CELL+1, s=CELL-2;
    if(isHead){ctx.shadowColor='#00ffaa';ctx.shadowBlur=18;ctx.fillStyle='#00ffaa';}
    else{ctx.shadowBlur=0;const b=Math.round(180-t*120);ctx.fillStyle=`rgb(0,${b},${Math.round(b*0.55)})`;}
    ctx.beginPath(); ctx.roundRect(x,y,s,s,isHead?5:3); ctx.fill();
    if(isHead){
      ctx.shadowBlur=0;
      const ex=dir.x,ey=dir.y,ox=ey*3,oy=-ex*3;
      const px=seg.x*CELL+CELL/2+ex*4, py=seg.y*CELL+CELL/2+ey*4;
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(px+ox,py+oy,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(px-ox,py-oy,2,0,Math.PI*2);ctx.fill();
    }
  });
  ctx.shadowBlur=0;
}

function drawDead() {
  drawGrid();
  snake.forEach(seg=>{ctx.fillStyle='#ff335566';ctx.fillRect(seg.x*CELL+1,seg.y*CELL+1,CELL-2,CELL-2);});
  drawApple();
}

function draw(){drawGrid();drawApple();drawSnake();}

function loop(ts) {
  if(!running)return;
  if(!lastTime||ts-lastTime>=speed){lastTime=ts;step();if(running)draw();}
  if(running) raf2=requestAnimationFrame(loop);
}

function startGame() {
  overlay.style.display='none';
  init(); draw();
  running=true; lastTime=null;
  raf2=requestAnimationFrame(loop);
}

const KEY_MAP = {
  ArrowUp:{x:0,y:-1},w:{x:0,y:-1},W:{x:0,y:-1},
  ArrowDown:{x:0,y:1},s:{x:0,y:1},S:{x:0,y:1},
  ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},A:{x:-1,y:0},
  ArrowRight:{x:1,y:0},d:{x:1,y:0},D:{x:1,y:0},
};
document.addEventListener('keydown',e=>{
  const d=KEY_MAP[e.key]; if(!d)return; e.preventDefault();
  if(d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
});
document.querySelectorAll('.dpad-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const map={UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};
    const d=map[btn.dataset.dir];
    if(d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
  });
});
let tx,ty;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  let d; if(Math.abs(dx)>Math.abs(dy))d=dx>0?{x:1,y:0}:{x:-1,y:0}; else d=dy>0?{x:0,y:1}:{x:0,y:-1};
  if(d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
},{passive:true});

document.getElementById('startBtn').addEventListener('click', startGame);
drawGrid();

document.getElementById('menu-btn').addEventListener('click', () => {
  running = false;
  cancelAnimationFrame(raf2);
  const gameUI = document.getElementById('game-ui');
  gameUI.classList.remove('show');
  const intro = document.getElementById('intro');
  intro.style.display = '';
  intro.classList.remove('hide');
  // Reset overlay for next time game is entered
  overlay.style.display = 'flex';
  overlay.innerHTML = `<h2 class="start">READY</h2><p>ARROW KEYS or WASD to move</p><button class="game-btn" id="startBtn">START GAME</button>`;
  document.getElementById('startBtn').addEventListener('click', startGame);
});
</script>
